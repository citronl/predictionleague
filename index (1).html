<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:#1a6b3c;--green-light:#e8f5ee;--green-mid:#2d9c5a;
    --gold:#d4a017;--pitch:#1a3c1a;--off-white:#f7f7f5;
    --gray-100:#f0f0ec;--gray-200:#e0e0d8;--gray-400:#9a9a90;--gray-700:#3a3a36;
    --text:#1a1a18;--danger:#c0392b;--danger-light:#fdecea;
    --amber:#d97706;--amber-light:#fef3c7;
    --radius:8px;--radius-lg:14px;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--pitch);min-height:100vh;color:var(--text);}
  .app-shell{min-height:100vh;display:flex;flex-direction:column;}
  .header{background:var(--pitch);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--green-mid);}
  .header-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:white;letter-spacing:2px;}
  .header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .badge-user{background:var(--green-mid);color:white;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;}
  .badge-admin{background:var(--gold);color:#3a2a00;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
  .btn-link{background:none;border:none;color:var(--gray-400);font-size:13px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:4px;}
  .btn-link:hover{color:white;}
  .main-content{flex:1;background:var(--off-white);border-radius:18px 18px 0 0;margin-top:4px;padding:24px 18px;max-width:680px;width:100%;margin-left:auto;margin-right:auto;}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;padding:24px;background:var(--pitch);}
  .auth-logo{font-family:'Bebas Neue',sans-serif;font-size:50px;color:white;letter-spacing:4px;text-align:center;line-height:1;margin-bottom:6px;}
  .auth-sub{color:var(--green-mid);font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:22px;}
  .auth-card{background:white;border-radius:var(--radius-lg);padding:26px;width:100%;max-width:360px;box-shadow:var(--shadow);}
  .auth-tabs{display:flex;margin-bottom:22px;border-bottom:1.5px solid var(--gray-200);}
  .auth-tab{flex:1;text-align:center;padding:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;}
  .auth-tab.active{color:var(--green);border-bottom-color:var(--green);}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .form-input{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:15px;font-family:inherit;color:var(--text);background:white;outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--green-mid);}
  .btn-primary{width:100%;background:var(--green);color:white;border:none;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn-primary:hover{background:var(--green-mid);}
  .btn-primary:disabled{background:var(--gray-400);cursor:not-allowed;opacity:.7;}
  .error-msg{background:var(--danger-light);color:var(--danger);padding:10px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:13px;}
  .success-msg{background:var(--green-light);color:var(--green);padding:10px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:13px;font-weight:500;}
  .tabs{display:flex;background:var(--gray-100);border-radius:10px;padding:4px;margin-bottom:18px;gap:4px;}
  .tab{flex:1;text-align:center;padding:8px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-400);border:none;background:none;font-family:inherit;transition:all .15s;}
  .tab.active{background:white;color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--pitch);margin-bottom:14px;}
  .prediction-card{background:white;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px;}
  .prediction-header{background:var(--pitch);color:white;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;}
  .prediction-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--green-mid);}
  .prediction-match{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;text-align:center;padding:18px 14px 6px;color:var(--pitch);}
  .prediction-vs{color:var(--gray-400);font-size:16px;padding:0 8px;}
  .score-inputs{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 18px 18px;}
  .score-input-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .score-input-label{font-size:11px;color:var(--gray-400);font-weight:500;}
  .score-input{width:62px;height:62px;text-align:center;font-size:26px;font-family:'Bebas Neue',sans-serif;border:2px solid var(--gray-200);border-radius:var(--radius);color:var(--pitch);outline:none;transition:border-color .15s;}
  .score-input:focus{border-color:var(--green-mid);}
  .score-dash{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gray-400);padding-top:18px;}
  .submit-wrap{padding:0 18px 18px;}
  .btn-submit{width:100%;background:var(--green);color:white;border:none;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn-submit:disabled{background:var(--gray-400);cursor:not-allowed;opacity:.7;}
  .already-predicted{display:flex;align-items:center;gap:10px;background:var(--green-light);border-radius:var(--radius);padding:13px 16px;margin:0 18px 18px;color:var(--green);font-weight:500;font-size:14px;}
  .closed-banner{display:flex;align-items:center;gap:10px;background:var(--amber-light);border-radius:var(--radius);padding:13px 16px;margin:0 18px 0;color:var(--amber);font-weight:500;font-size:14px;}
  .reveal-section{padding:14px 18px 18px;}
  .reveal-title{font-size:12px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .reveal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
  .reveal-card{background:var(--gray-100);border-radius:var(--radius);padding:10px 12px;display:flex;flex-direction:column;gap:3px;}
  .reveal-card.mine{background:var(--green-light);border:1.5px solid #b6e0c8;}
  .reveal-name{font-size:12px;font-weight:600;color:var(--gray-700);}
  .reveal-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--pitch);line-height:1;}
  .reveal-card.mine .reveal-name{color:var(--green);}
  .reveal-card.mine .reveal-score{color:var(--green);}
  .no-game{background:white;border-radius:var(--radius-lg);padding:30px 18px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px;}
  .no-game-icon{font-size:32px;margin-bottom:10px;}
  .no-game-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--pitch);margin-bottom:5px;letter-spacing:1px;}
  .no-game-sub{font-size:14px;color:var(--gray-400);}
  .lb-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100);gap:12px;}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:26px;text-align:center;color:var(--gray-400);}
  .lb-rank.top{color:var(--gold);}
  .lb-avatar{width:34px;height:34px;border-radius:50%;background:var(--green-light);color:var(--green);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .lb-name-cell{flex:1;font-weight:500;font-size:14px;}
  .lb-you{font-size:11px;font-weight:600;background:var(--green-light);color:var(--green);padding:2px 7px;border-radius:20px;margin-left:6px;}
  .lb-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--pitch);min-width:34px;text-align:right;}
  .lb-pts-label{font-size:10px;color:var(--gray-400);font-weight:500;text-align:right;}
  .admin-section{background:white;border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
  .admin-section-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--pitch);margin-bottom:13px;}
  .divider{height:1px;background:var(--gray-200);margin:14px 0;}
  .inline-inputs{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
  .inline-inputs .form-group{margin-bottom:0;flex:1;min-width:110px;}
  .btn-secondary{background:var(--gray-100);border:1.5px solid var(--gray-200);padding:9px 14px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);white-space:nowrap;}
  .btn-danger{background:var(--danger-light);border:1.5px solid #f5c6c1;padding:9px 14px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--danger);}
  .btn-gold{background:var(--gold);border:none;padding:9px 14px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#3a2a00;}
  .btn-gold:disabled{opacity:.5;cursor:not-allowed;}
  .btn-amber{background:var(--amber-light);border:1.5px solid #fcd34d;padding:9px 14px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--amber);}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .status-open{background:var(--green-light);color:var(--green);}
  .status-closed{background:var(--amber-light);color:var(--amber);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .pred-chip{background:var(--gray-100);border-radius:6px;padding:5px 9px;font-size:13px;display:inline-flex;align-items:center;gap:5px;}
  .pred-chip.correct{background:var(--green-light);color:var(--green);}
  .pred-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .history-item{background:white;border-radius:var(--radius-lg);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:10px;}
  .history-top{display:flex;justify-content:space-between;margin-bottom:8px;}
  .history-match{font-weight:600;font-size:15px;}
  .history-result{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);}
  .history-round{font-size:12px;color:var(--gray-400);}
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
  .confirm-box{background:white;border-radius:var(--radius-lg);padding:24px;max-width:340px;width:100%;text-align:center;}
  .confirm-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--danger);margin-bottom:8px;}
  .confirm-text{font-size:14px;color:var(--gray-700);line-height:1.5;margin-bottom:18px;}
  .confirm-actions{display:flex;gap:10px;}
  .confirm-actions button{flex:1;}
  .loading-wrap{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--gray-400);font-size:14px;}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--gray-200);border-top-color:var(--green-mid);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .my-score-bar{background:white;border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
</style>
</head>
<body>
<div id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Init Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC2uUSCgqDfu_2nVxP8ScF1kv-05b9Kwoo",
  authDomain: "prediction-league-45972.firebaseapp.com",
  projectId: "prediction-league-45972",
  storageBucket: "prediction-league-45972.firebasestorage.app",
  messagingSenderId: "638137442083",
  appId: "1:638137442083:web:c9252cd64fba952353f696"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_UN = 'admin';
const ADMIN_PW = 'admin123';

// ---- DB helpers ----
async function dbGet(id) {
  try {
    const snap = await db.collection('league').doc(id).get();
    return snap.exists ? snap.data().value : null;
  } catch(e) { console.error('dbGet error', e); return null; }
}
async function dbSet(id, val) {
  try {
    await db.collection('league').doc(id).set({ value: val });
    return true;
  } catch(e) { console.error('dbSet error', e); return false; }
}
function dbListen(id, cb) {
  return db.collection('league').doc(id).onSnapshot(snap => {
    cb(snap.exists ? snap.data().value : null);
  }, err => console.error('listen error', err));
}

async function getUsers()   { return (await dbGet('users')) || {}; }
async function getGame()    { return await dbGet('game'); }
async function getHistory() { return (await dbGet('history')) || []; }
async function saveUsers(u) { return dbSet('users', u); }
async function saveGame(g)  { return dbSet('game', g); }
async function saveHistory(h) { return dbSet('history', h); }

// ---- App state ----
let currentUser = null;
let S = { screen: 'auth', authTab: 'login', authUsername: '' };
let unsubs = [];

function stopListening() { unsubs.forEach(u => u()); unsubs = []; }

function render() {
  const el = document.getElementById('app');
  if (S.screen === 'auth')   { renderAuth(el); return; }
  if (S.screen === 'player') { renderPlayer(el); return; }
  if (S.screen === 'admin')  { renderAdmin(el); return; }
}

// ---- AUTH ----
function renderAuth(el) {
  el.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-logo">Prediction<br>League</div>
      <div class="auth-sub">Football Manager Edition</div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab ${S.authTab==='login'?'active':''}" id="tl">Log in</div>
          <div class="auth-tab ${S.authTab==='register'?'active':''}" id="tr">Register</div>
        </div>
        ${S.authError ? `<div class="error-msg">${S.authError}</div>` : ''}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="au" value="${S.authUsername}" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="ap" autocomplete="${S.authTab==='register'?'new-password':'current-password'}">
        </div>
        <button class="btn-primary" id="as" ${S.authLoading?'disabled':''}>${S.authLoading?'…':S.authTab==='register'?'Create account':'Log in'}</button>
        ${S.authTab==='login'?'<p style="font-size:12px;color:var(--gray-400);text-align:center;margin-top:10px">Admin: <strong>admin</strong> / <strong>admin123</strong></p>':''}
      </div>
    </div>`;

  document.getElementById('tl').onclick = () => { S.authTab='login'; S.authError=''; render(); };
  document.getElementById('tr').onclick = () => { S.authTab='register'; S.authError=''; render(); };
  document.getElementById('au').oninput = e => S.authUsername = e.target.value;
  document.getElementById('ap').onkeydown = e => { if(e.key==='Enter') doAuth(); };
  document.getElementById('as').onclick = doAuth;
}

async function doAuth() {
  const u = S.authUsername.trim().toLowerCase();
  const pw = document.getElementById('ap').value;
  if (!u || !pw) { S.authError = 'Fill in both fields.'; render(); return; }
  S.authLoading = true; S.authError = ''; render();
  try {
    if (S.authTab === 'register') {
      if (u === ADMIN_UN) { S.authError = 'That username is reserved.'; S.authLoading=false; render(); return; }
      const users = await getUsers();
      if (users[u]) { S.authError = 'Username taken.'; S.authLoading=false; render(); return; }
      users[u] = { password: pw, points: 0 };
      await saveUsers(users);
      currentUser = { username: u, isAdmin: false };
    } else {
      if (u === ADMIN_UN && pw === ADMIN_PW) {
        currentUser = { username: ADMIN_UN, isAdmin: true };
      } else {
        const users = await getUsers();
        if (!users[u]) { S.authError = 'User not found.'; S.authLoading=false; render(); return; }
        if (users[u].password !== pw) { S.authError = 'Wrong password.'; S.authLoading=false; render(); return; }
        currentUser = { username: u, isAdmin: false };
      }
    }
    S.authLoading = false;
    S.screen = currentUser.isAdmin ? 'admin' : 'player';
    S.playerTab = 'predict';
    S.adminTab = 'manage';
    S.game = undefined;
    S.users = {};
    S.history = [];
    render();
    startListening();
  } catch(e) {
    console.error(e);
    S.authError = 'Connection error. Try again.';
    S.authLoading = false;
    render();
  }
}

function startListening() {
  stopListening();
  unsubs.push(dbListen('game',    g => { S.game = g;        render(); }));
  unsubs.push(dbListen('users',   u => { S.users = u || {}; render(); }));
  unsubs.push(dbListen('history', h => { S.history = h || []; render(); }));
}

function doLogout() {
  stopListening();
  currentUser = null;
  S = { screen: 'auth', authTab: 'login', authUsername: '' };
  render();
}

// ---- PLAYER ----
function renderPlayer(el) {
  const game    = S.game;
  const users   = S.users || {};
  const history = S.history || [];
  const myPoints = users[currentUser.username]?.points || 0;
  const lb = Object.entries(users)
    .filter(([u]) => u !== ADMIN_UN)
    .map(([u,d]) => ({ username:u, points: d.points||0 }))
    .sort((a,b) => b.points - a.points);
  const myRank = lb.findIndex(x => x.username === currentUser.username) + 1;
  const myPred = game?.predictions?.[currentUser.username];
  const isClosed = game?.status === 'closed';

  el.innerHTML = `
    <div class="app-shell">
      <div class="header">
        <div class="header-title">&#9917; Prediction League</div>
        <div class="header-actions">
          <span class="badge-user">${currentUser.username}</span>
          <button class="btn-link" id="logout">Log out</button>
        </div>
      </div>
      <div class="main-content">
        <div class="tabs">
          <button class="tab ${S.playerTab==='predict'?'active':''}" data-tab="predict">Predict</button>
          <button class="tab ${S.playerTab==='table'?'active':''}" data-tab="table">Table</button>
          <button class="tab ${S.playerTab==='history'?'active':''}" data-tab="history">History</button>
        </div>

        ${S.playerTab==='predict' ? renderPlayerPredict(game, myPred, isClosed, myPoints, myRank) : ''}
        ${S.playerTab==='table'   ? renderLeaderboard(lb, currentUser.username) : ''}
        ${S.playerTab==='history' ? renderPlayerHistory(history) : ''}
      </div>
    </div>`;

  document.getElementById('logout').onclick = doLogout;
  document.querySelectorAll('.tab[data-tab]').forEach(t =>
    t.onclick = () => { S.playerTab = t.dataset.tab; render(); });

  const sb = document.getElementById('submit-pred');
  if (sb) sb.onclick = doSubmitPrediction;
}

function renderPlayerPredict(game, myPred, isClosed, myPoints, myRank) {
  return `
    ${S.predMsg ? `<div class="success-msg">${S.predMsg}</div>` : ''}
    ${game === undefined
      ? '<div class="loading-wrap"><span class="spinner"></span><span>Loading…</span></div>'
      : game
        ? `<div class="prediction-card">
            <div class="prediction-header">
              <span class="prediction-label">Now predicting</span>
              <div style="display:flex;align-items:center;gap:8px">
                ${game.round ? `<span style="font-size:12px;color:var(--gray-400)">${game.round}</span>` : ''}
                <span class="status-pill ${isClosed?'status-closed':'status-open'}">
                  <span class="status-dot"></span>${isClosed?'Closed':'Open'}
                </span>
              </div>
            </div>
            <div class="prediction-match">${game.home}<span class="prediction-vs"> vs </span>${game.away}</div>
            ${myPred
              ? `<div class="already-predicted"><span>&#10003;</span><span>You predicted ${myPred.home} &ndash; ${myPred.away}. Waiting for result&hellip;</span></div>`
              : isClosed
                ? `<div class="closed-banner"><span>&#128274;</span><span>Predictions are closed for this game.</span></div>`
                : `<div class="score-inputs">
                    <div class="score-input-wrap">
                      <span class="score-input-label">${game.home}</span>
                      <input class="score-input" type="number" min="0" max="99" id="hs" placeholder="0">
                    </div>
                    <span class="score-dash">&ndash;</span>
                    <div class="score-input-wrap">
                      <span class="score-input-label">${game.away}</span>
                      <input class="score-input" type="number" min="0" max="99" id="as2" placeholder="0">
                    </div>
                  </div>
                  <div class="submit-wrap">
                    <button class="btn-submit" id="submit-pred">Lock in prediction</button>
                  </div>`}
            ${isClosed ? `
              <div class="reveal-section">
                <div class="reveal-title">Everyone's predictions</div>
                <div class="reveal-grid">
                  ${Object.keys(game.predictions||{}).length === 0
                    ? '<div style="font-size:13px;color:var(--gray-400)">No predictions submitted.</div>'
                    : Object.entries(game.predictions).map(([u,p]) =>
                        `<div class="reveal-card ${u===currentUser.username?'mine':''}">
                          <div class="reveal-name">${u}${u===currentUser.username?' (you)':''}</div>
                          <div class="reveal-score">${p.home}&ndash;${p.away}</div>
                        </div>`).join('')}
                </div>
              </div>` : ''}
          </div>`
        : `<div class="no-game">
            <div class="no-game-icon">&#9208;</div>
            <div class="no-game-title">No game active</div>
            <div class="no-game-sub">The admin will post the next match soon.</div>
          </div>`}
    <div class="my-score-bar">
      <div>
        <div style="font-size:11px;color:var(--gray-400);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Your score</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--pitch);line-height:1">${myPoints} <span style="font-size:14px;color:var(--gray-400)">pts</span></div>
      </div>
      ${myRank > 0 ? `<div style="text-align:right">
        <div style="font-size:11px;color:var(--gray-400);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Rank</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:${myRank===1?'var(--gold)':'var(--pitch)'};line-height:1">#${myRank}</div>
      </div>` : ''}
    </div>`;
}

async function doSubmitPrediction() {
  const h = document.getElementById('hs')?.value;
  const a = document.getElementById('as2')?.value;
  if (h === '' || h === undefined || a === '' || a === undefined) return;
  const btn = document.getElementById('submit-pred');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const g = await getGame();
    if (!g || g.status === 'closed') { S.predMsg = 'Predictions are now closed.'; render(); return; }
    if (!g.predictions) g.predictions = {};
    g.predictions[currentUser.username] = { home: parseInt(h), away: parseInt(a) };
    await saveGame(g);
    S.predMsg = 'Prediction locked in!';
    setTimeout(() => { S.predMsg = ''; render(); }, 3000);
  } catch(e) { console.error(e); }
}

function renderLeaderboard(lb, myUsername) {
  return `
    <div class="section-title">Leaderboard</div>
    <div style="background:white;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)">
      ${lb.length === 0
        ? '<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:14px">No players yet</div>'
        : lb.map((p,i) => `
          <div class="lb-row">
            <span class="lb-rank ${i<3?'top':''}">${i+1}</span>
            <div class="lb-avatar">${p.username[0].toUpperCase()}</div>
            <span class="lb-name-cell">${p.username}${p.username===myUsername?'<span class="lb-you">you</span>':''}</span>
            <div><div class="lb-pts">${p.points}</div><div class="lb-pts-label">pts</div></div>
          </div>`).join('')}
    </div>`;
}

function renderPlayerHistory(history) {
  return `
    <div class="section-title">Past games</div>
    ${history.length === 0
      ? '<div class="no-game"><div class="no-game-sub">No completed games yet.</div></div>'
      : [...history].reverse().map(g => {
          const myP = g.predictions?.[currentUser.username];
          const correct = myP && myP.home===g.result.home && myP.away===g.result.away;
          return `<div class="history-item">
            <div class="history-top">
              <div>
                <div class="history-match">${g.home} vs ${g.away}</div>
                ${g.round?`<div class="history-round">${g.round}</div>`:''}
              </div>
              <div class="history-result">${g.result.home}&ndash;${g.result.away}</div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
              <span style="color:var(--gray-400)">${myP?`Your pick: <strong>${myP.home}&ndash;${myP.away}</strong>`:'No prediction'}</span>
              ${correct
                ? '<span style="background:var(--green-light);color:var(--green);font-weight:600;font-size:12px;padding:3px 10px;border-radius:20px">+1 pt</span>'
                : '<span style="background:var(--gray-100);color:var(--gray-400);font-size:12px;padding:3px 10px;border-radius:20px">miss</span>'}
            </div>
          </div>`;
        }).join('')}`;
}

// ---- ADMIN ----
function renderAdmin(el) {
  const game    = S.game;
  const users   = S.users || {};
  const history = S.history || [];
  const lb = Object.entries(users)
    .filter(([u]) => u !== ADMIN_UN)
    .map(([u,d]) => ({ username:u, points:d.points||0 }))
    .sort((a,b) => b.points-a.points);
  const predCount = game ? Object.keys(game.predictions||{}).length : 0;
  const isClosed = game?.status === 'closed';

  el.innerHTML = `
    ${S.confirmReset ? `
      <div class="confirm-overlay">
        <div class="confirm-box">
          <div class="confirm-title">Reset season?</div>
          <p class="confirm-text">This will zero all points and clear all history. This cannot be undone.</p>
          <div class="confirm-actions">
            <button class="btn-secondary" id="cancel-reset">Cancel</button>
            <button class="btn-danger" id="do-reset">Reset</button>
          </div>
        </div>
      </div>` : ''}
    <div class="app-shell">
      <div class="header">
        <div class="header-title">&#9917; Prediction League</div>
        <div class="header-actions">
          <span class="badge-admin">ADMIN</span>
          <button class="btn-link" id="logout">Log out</button>
        </div>
      </div>
      <div class="main-content">
        <div class="tabs">
          <button class="tab ${S.adminTab==='manage'?'active':''}" data-tab="manage">Manage</button>
          <button class="tab ${S.adminTab==='table'?'active':''}" data-tab="table">Table</button>
          <button class="tab ${S.adminTab==='history'?'active':''}" data-tab="history">History</button>
        </div>
        ${S.adminMsg ? `<div class="success-msg">${S.adminMsg}</div>` : ''}

        ${S.adminTab==='manage' ? `
          <div class="admin-section">
            <div class="admin-section-title">Current game</div>
            ${game === undefined
              ? '<div class="loading-wrap"><span class="spinner"></span><span>Loading…</span></div>'
              : game
                ? `<div class="toggle-row">
                    <div>
                      <div style="font-weight:600;font-size:15px">${game.home} vs ${game.away}</div>
                      ${game.round?`<div style="font-size:12px;color:var(--gray-400);margin-top:2px">${game.round}</div>`:''}
                    </div>
                    <span class="status-pill ${isClosed?'status-closed':'status-open'}" style="font-size:13px">
                      <span class="status-dot"></span>${isClosed?'Predictions closed':'Predictions open'}
                    </span>
                  </div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
                    <button class="${isClosed?'btn-secondary':'btn-amber'}" id="toggle-btn">
                      ${isClosed?'&#128275; Open predictions':'&#128274; Close predictions'}
                    </button>
                    <button class="btn-danger" id="clear-btn">Clear game</button>
                  </div>
                  <div style="font-size:12px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
                    ${predCount} prediction${predCount!==1?'s':''} received
                    ${isClosed&&predCount>0?'<span style="margin-left:8px;color:var(--green)">&#8212; visible to all players</span>':''}
                  </div>
                  ${predCount>0?`<div class="pred-chips">${Object.entries(game.predictions).map(([u,p])=>`<div class="pred-chip"><span style="font-weight:500">${u}</span><span style="color:var(--gray-400);font-size:12px">${p.home}&ndash;${p.away}</span></div>`).join('')}</div>`:''}
                  <div class="divider"></div>
                  <div class="admin-section-title" style="margin-bottom:10px">Enter result</div>
                  <div class="inline-inputs">
                    <div class="form-group"><label class="form-label">${game.home}</label><input class="form-input" type="number" min="0" id="rh" placeholder="0"></div>
                    <div class="form-group"><label class="form-label">${game.away}</label><input class="form-input" type="number" min="0" id="ra" placeholder="0"></div>
                    <button class="btn-gold" id="result-btn" style="height:42px;align-self:flex-end">Submit result</button>
                  </div>`
                : `<p style="font-size:14px;color:var(--gray-400);margin-bottom:14px">No game active. Post one to start collecting predictions.</p>
                  <div class="inline-inputs" style="margin-bottom:10px">
                    <div class="form-group"><label class="form-label">Home team</label><input class="form-input" id="nh" placeholder="Man City"></div>
                    <div class="form-group"><label class="form-label">Away team</label><input class="form-input" id="na" placeholder="Arsenal"></div>
                  </div>
                  <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Round / label (optional)</label>
                    <input class="form-input" id="nr" placeholder="Week 14">
                  </div>
                  <button class="btn-primary" id="post-btn">Post game (opens predictions)</button>`}
          </div>
          <div class="admin-section">
            <div class="admin-section-title">Season</div>
            <p style="font-size:14px;color:var(--gray-400);margin-bottom:12px">Resets all points and history when the season ends.</p>
            <button class="btn-danger" id="reset-btn">Reset season</button>
          </div>` : ''}

        ${S.adminTab==='table' ? renderLeaderboard(lb, null) : ''}

        ${S.adminTab==='history' ? `
          <div class="section-title">Completed games</div>
          ${history.length===0
            ? '<div class="no-game"><div class="no-game-sub">No results yet.</div></div>'
            : [...history].reverse().map(g => `
              <div class="history-item">
                <div class="history-top">
                  <div>
                    <div class="history-match">${g.home} vs ${g.away}</div>
                    ${g.round?`<div class="history-round">${g.round}</div>`:''}
                  </div>
                  <div class="history-result">${g.result.home}&ndash;${g.result.away}</div>
                </div>
                <div class="pred-chips" style="margin-top:8px">
                  ${Object.entries(g.predictions||{}).map(([u,p]) => {
                    const ok = p.home===g.result.home && p.away===g.result.away;
                    return `<div class="pred-chip ${ok?'correct':''}"><span style="font-weight:500">${u}</span><span style="color:var(--gray-400);font-size:12px">${p.home}&ndash;${p.away}</span>${ok?'<span>&#10003;</span>':''}</div>`;
                  }).join('')}
                  ${Object.keys(g.predictions||{}).length===0?'<span style="font-size:13px;color:var(--gray-400)">No predictions</span>':''}
                </div>
              </div>`).join('')}` : ''}
      </div>
    </div>`;

  document.getElementById('logout').onclick = doLogout;
  document.querySelectorAll('.tab[data-tab]').forEach(t =>
    t.onclick = () => { S.adminTab = t.dataset.tab; render(); });

  if (S.confirmReset) {
    document.getElementById('cancel-reset').onclick = () => { S.confirmReset=false; render(); };
    document.getElementById('do-reset').onclick = doResetSeason;
  }

  const postBtn = document.getElementById('post-btn');
  if (postBtn) postBtn.onclick = doPostGame;

  const toggleBtn = document.getElementById('toggle-btn');
  if (toggleBtn) toggleBtn.onclick = doToggleStatus;

  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.onclick = doClearGame;

  const resultBtn = document.getElementById('result-btn');
  if (resultBtn) resultBtn.onclick = doSubmitResult;

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.onclick = () => { S.confirmReset=true; render(); };
}

function flashAdmin(msg) {
  S.adminMsg = msg;
  render();
  setTimeout(() => { S.adminMsg=''; render(); }, 4000);
}

async function doPostGame() {
  const h = document.getElementById('nh').value.trim();
  const a = document.getElementById('na').value.trim();
  const r = document.getElementById('nr').value.trim();
  if (!h || !a) return;
  document.getElementById('post-btn').disabled = true;
  await saveGame({ home:h, away:a, round:r, status:'open', predictions:{}, postedAt:Date.now() });
  flashAdmin('Game posted — predictions are open.');
}

async function doToggleStatus() {
  document.getElementById('toggle-btn').disabled = true;
  const g = await getGame();
  if (!g) return;
  g.status = g.status==='open' ? 'closed' : 'open';
  await saveGame(g);
  flashAdmin(`Predictions ${g.status==='open'?'opened':'closed'}.`);
}

async function doClearGame() {
  document.getElementById('clear-btn').disabled = true;
  await saveGame(null);
  flashAdmin('Game cleared.');
}

async function doSubmitResult() {
  const rh = document.getElementById('rh').value;
  const ra = document.getElementById('ra').value;
  if (rh===''||ra==='') return;
  document.getElementById('result-btn').disabled = true;
  document.getElementById('result-btn').textContent = '…';
  const g = await getGame();
  if (!g) { flashAdmin('No active game.'); return; }
  const rH=parseInt(rh), rA=parseInt(ra);
  g.result = { home:rH, away:rA };
  const u = await getUsers();
  let winners = [];
  Object.entries(g.predictions||{}).forEach(([un,pred]) => {
    if (pred.home===rH && pred.away===rA) { u[un].points=(u[un].points||0)+1; winners.push(un); }
  });
  const hist = await getHistory();
  await Promise.all([saveUsers(u), saveHistory([...hist, g]), saveGame(null)]);
  flashAdmin(`Done! ${winners.length} correct: ${winners.length>0?winners.join(', '):'nobody'}.`);
}

async function doResetSeason() {
  document.getElementById('do-reset').disabled = true;
  const u = await getUsers();
  Object.keys(u).forEach(un => { u[un].points=0; });
  await Promise.all([saveUsers(u), saveGame(null), saveHistory([])]);
  S.confirmReset = false;
  flashAdmin('Season reset!');
}

// Boot
render();
</script>
</body>
</html>
